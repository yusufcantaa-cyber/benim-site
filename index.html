 <!DOCTYPE html>
<html>
<head>
    <title>Yusuf'un Oyunu</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: #00ff00; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; }
        #game-container { border: 2px solid #00ff00; padding: 20px; position: relative; width: 80vw; height: 70vh; overflow: hidden; }
        .box { width: 40px; height: 40px; background: red; position: absolute; box-shadow: 0 0 10px red; border-radius: 5px; transition: 0.1s; }
        .controls { margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <h1>YUSUF CANTAA ONLINE</h1>
    <div id="game-container">
        <div id="player" class="box" style="top: 50%; left: 50%;"></div>
    </div>
    <div class="controls">W-A-S-D ile hareket et | Bosluk ile renk degistir!</div>

    <script>
        const player = document.getElementById('player');
        let topPos = 50;
        let leftPos = 50;

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') topPos = Math.max(0, topPos - 5);
            if (key === 's') topPos = Math.min(90, topPos + 5);
            if (key === 'a') leftPos = Math.max(0, leftPos - 5);
            if (key === 'd') leftPos = Math.min(95, leftPos + 5);
            if (e.code === 'Space') player.style.background = '#' + Math.floor(Math.random()*16777215).toString(16);
            
            player.style.top = topPos + '%';
            player.style.left = leftPos + '%';
        });
    </script>
</body>
</html>
